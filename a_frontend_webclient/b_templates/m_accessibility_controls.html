<div class="accessibility-controls">
    <button
        id="btn-accessibility-increase"
        class="accessibility-btn"
        type="button"
        title="Aumentar tamanho da fonte"
        aria-label="Aumentar tamanho da fonte">
        A+
    </button>
    <button
        id="btn-accessibility-reset"
        class="accessibility-btn"
        type="button"
        title="Restaurar tamanho padrão"
        aria-label="Restaurar tamanho padrão">
        A
    </button>
    <button
        id="btn-accessibility-decrease"
        class="accessibility-btn"
        type="button"
        title="Diminuir tamanho da fonte"
        aria-label="Diminuir tamanho da fonte">
        A−
    </button>
    <div class="accessibility-separator"></div>
    <button
        id="btn-accessibility-theme"
        class="accessibility-btn"
        type="button"
        title="Alternar tema escuro/claro"
        aria-label="Alternar tema"
        aria-pressed="false">
    </button>
</div>
