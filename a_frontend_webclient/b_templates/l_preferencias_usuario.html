<script>
    window.PFF_CONFIG = {{ (configuracoes or { }) | tojson }};
    window.PFF_CSRF_TOKEN = "{{ csrf_token }}";
</script>
<script src="{{ url_for('static', filename='b_js/a_temas.js') }}"></script>
<script>
    async function logoutSidebar(event) {
        event.preventDefault();

        try {
            const response = await fetch('/api/logout', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': window.PFF_CSRF_TOKEN
                }
            });

            if (!response.ok) {
                console.error('Logout failed', await response.text());
            }
        } catch (error) {
            console.error('Logout error', error);
        } finally {
            window.location.href = '/';
        }
    }
</script>
